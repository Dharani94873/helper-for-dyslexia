version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: dyslexia-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: dyslexia-helper
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - dyslexia-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dyslexia-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/dyslexia-helper?authSource=admin
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_EXPIRE: 7d
      ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      MAX_FILE_SIZE: 10485760
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongodb
    networks:
      - dyslexia-network
    command: npm run dev

volumes:
  mongodb_data:
    driver: local

networks:
  dyslexia-network:
    driver: bridge
