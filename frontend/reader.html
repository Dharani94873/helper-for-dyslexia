<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Accessibility Helper for Dyslexia - A reading tool with text formatting, syllable splitting, and text-to-speech">
  <title>Accessibility Helper for Dyslexia</title>
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- Professional White Theme -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">

  <style id="professional-theme">
    :root{--primary:#4f6ef7;--primary-dark:#3a56d4;--primary-light:#eef1ff;--accent:#06c090;--accent-dark:#04a07a;--danger:#f04f5f;--warning:#f5a623;--white:#fff;--bg:#f5f7ff;--surface:#fff;--border:#e8eaf0;--border-strong:#d1d5e0;--text-primary:#1a1d2e;--text-secondary:#5a6178;--text-muted:#9299b2;--shadow-xs:0 1px 3px rgba(0,0,0,.05);--shadow-sm:0 2px 8px rgba(0,0,0,.07);--shadow-md:0 4px 20px rgba(0,0,0,.09);--shadow-lg:0 8px 40px rgba(0,0,0,.12);--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:24px;--ease:0.2s cubic-bezier(0.4,0,0.2,1);}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif!important;background-color:var(--bg)!important;color:var(--text-primary)!important;-webkit-font-smoothing:antialiased;}
    body.bg-light{background:linear-gradient(145deg,#f0f3ff 0%,#fff 55%,#eafaf5 100%)!important;}
    .navbar,.navbar.navbar-dark.bg-primary{background:var(--white)!important;border-bottom:1px solid var(--border)!important;box-shadow:var(--shadow-xs)!important;padding:.7rem 1.5rem!important;position:sticky!important;top:0;z-index:1030;}
    .navbar-brand{font-weight:700!important;font-size:1.1rem!important;color:var(--primary)!important;}
    .navbar-brand i{color:var(--primary)!important;}
    .navbar-nav .nav-link{color:var(--text-secondary)!important;font-weight:500!important;font-size:.88rem!important;padding:.42rem .85rem!important;border-radius:var(--radius-sm)!important;transition:all var(--ease)!important;}
    .navbar-nav .nav-link:hover,.navbar-nav .nav-link.active{color:var(--primary)!important;background:var(--primary-light)!important;}
    .navbar-toggler{border:none!important;} .navbar-toggler:focus{box-shadow:none!important;}
    .btn-primary{background:var(--primary)!important;border-color:var(--primary)!important;color:#fff!important;font-weight:600!important;border-radius:var(--radius-sm)!important;box-shadow:0 2px 8px rgba(79,110,247,.28)!important;transition:all var(--ease)!important;}
    .btn-primary:hover,.btn-primary:focus{background:var(--primary-dark)!important;border-color:var(--primary-dark)!important;color:#fff!important;box-shadow:0 4px 16px rgba(79,110,247,.38)!important;transform:translateY(-1px);}
    .btn-primary:active{transform:none!important;}
    .btn-outline-primary{color:var(--primary)!important;border-color:var(--primary)!important;font-weight:500!important;border-radius:var(--radius-sm)!important;transition:all var(--ease)!important;}
    .btn-outline-primary:hover{background:var(--primary)!important;color:#fff!important;}
    .btn-success{background:var(--accent)!important;border-color:var(--accent)!important;color:#fff!important;font-weight:600!important;border-radius:var(--radius-sm)!important;transition:all var(--ease)!important;}
    .btn-success:hover{background:var(--accent-dark)!important;border-color:var(--accent-dark)!important;color:#fff!important;}
    .btn-outline-success{color:var(--accent)!important;border-color:var(--accent)!important;font-weight:500!important;border-radius:var(--radius-sm)!important;}
    .btn-outline-success:hover{background:var(--accent)!important;color:#fff!important;}
    .btn-secondary{background:#f0f2f8!important;border-color:#f0f2f8!important;color:var(--text-secondary)!important;font-weight:500!important;border-radius:var(--radius-sm)!important;}
    .btn-secondary:hover{background:var(--border)!important;border-color:var(--border)!important;}
    .btn-danger{background:var(--danger)!important;border-color:var(--danger)!important;border-radius:var(--radius-sm)!important;}
    .btn-outline-warning{color:var(--warning)!important;border-color:var(--warning)!important;border-radius:var(--radius-sm)!important;}
    .btn-outline-danger{border-radius:var(--radius-sm)!important;}
    .card{background:var(--surface)!important;border:1px solid var(--border)!important;border-radius:var(--radius-md)!important;box-shadow:var(--shadow-sm)!important;}
    .card-header{background:#fafbff!important;border-bottom:1px solid var(--border)!important;border-radius:var(--radius-md) var(--radius-md) 0 0!important;padding:.9rem 1.25rem!important;}
    .card-header.bg-primary{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%)!important;border-bottom:none!important;}
    .card-header.bg-primary *{color:#fff!important;}
    .card-header.bg-success{background:linear-gradient(135deg,var(--accent) 0%,var(--accent-dark) 100%)!important;border-bottom:none!important;}
    .card-header.bg-success *{color:#fff!important;}
    .card-footer{background:#fafbff!important;border-top:1px solid var(--border)!important;border-radius:0 0 var(--radius-md) var(--radius-md)!important;}
    .reading-area{background:var(--white)!important;}
    #emptyState{padding:5rem 2rem!important;}
    #emptyState .bi.display-1{background:var(--primary-light);color:var(--primary)!important;border-radius:50%;padding:1.4rem;font-size:2.4rem!important;width:96px;height:96px;display:inline-flex!important;align-items:center;justify-content:center;margin-bottom:1.5rem!important;}
    #emptyState h3{font-weight:700;font-size:1.35rem;color:var(--text-primary);}
    #emptyState .lead{color:var(--text-secondary);max-width:430px;margin:0 auto 1.5rem;}
    #controlPanel .card{position:sticky;top:76px;max-height:calc(100vh - 96px);}
    #controlPanel .card-body{max-height:calc(100vh - 168px)!important;overflow-y:auto!important;}
    #controlPanel .card-body::-webkit-scrollbar{width:4px;}
    #controlPanel .card-body::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px;}
    #controlPanel h6{font-size:.7rem!important;text-transform:uppercase;letter-spacing:.09em;font-weight:700;color:var(--text-muted)!important;padding-bottom:.55rem!important;margin-bottom:.9rem!important;}
    .form-label{font-size:.81rem!important;font-weight:600!important;color:var(--text-secondary)!important;}
    .form-control,.form-select{border:1.5px solid var(--border)!important;border-radius:var(--radius-sm)!important;font-size:.87rem!important;color:var(--text-primary)!important;background-color:var(--white)!important;}
    .form-control:focus,.form-select:focus{border-color:var(--primary)!important;box-shadow:0 0 0 3px rgba(79,110,247,.12)!important;}
    .input-group-text{background:var(--primary-light)!important;border:1.5px solid var(--border)!important;color:var(--primary)!important;}
    .form-check-input:checked{background-color:var(--primary)!important;border-color:var(--primary)!important;}
    .form-check-input:focus{box-shadow:0 0 0 3px rgba(79,110,247,.15)!important;}
    .document-card{transition:transform var(--ease),box-shadow var(--ease),border-color var(--ease)!important;}
    .document-card:hover{transform:translateY(-5px)!important;box-shadow:var(--shadow-md)!important;border-color:var(--primary)!important;}
    .document-card .card-title{font-weight:700!important;color:var(--text-primary)!important;}
    .document-card .card-text{font-size:.82rem!important;color:var(--text-secondary)!important;line-height:1.85;}
    .document-card .card-text .bi{color:var(--primary)!important;}
    body.bg-light .card{border-radius:var(--radius-xl)!important;border:none!important;box-shadow:var(--shadow-lg)!important;overflow:hidden!important;}
    body.bg-light .card .text-center.mb-4{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%)!important;margin:-2rem -2.5rem 1.5rem!important;padding:2.5rem 2rem 2rem!important;border-radius:0!important;}
    body.bg-light .card .text-center.mb-4 i{color:rgba(255,255,255,.88)!important;}
    body.bg-light .card .text-center.mb-4 h2{color:#fff!important;font-weight:700!important;font-size:1.5rem!important;margin-top:.4rem!important;}
    body.bg-light .card .text-center.mb-4 p{color:rgba(255,255,255,.8)!important;font-size:.88rem!important;}
    body.bg-light .card .card-body{padding:2rem 2.5rem 2.25rem!important;}
    body.bg-light .bg-info-subtle{background:#f7f9ff!important;border:1.5px solid var(--border)!important;border-radius:var(--radius-md)!important;box-shadow:none!important;}
    body.bg-light .bg-info-subtle .card-title{color:var(--primary)!important;font-size:.82rem!important;font-weight:700!important;}
    body.bg-light .bg-info-subtle p{color:var(--text-secondary)!important;font-size:.83rem!important;}
    .modal-content{border:none!important;border-radius:var(--radius-lg)!important;box-shadow:var(--shadow-lg)!important;}
    .modal-header{border-bottom:1px solid var(--border)!important;padding:1.2rem 1.5rem!important;}
    .modal-title{font-weight:700!important;color:var(--text-primary)!important;}
    .modal-body{padding:1.5rem!important;}
    .modal-footer{border-top:1px solid var(--border)!important;padding:1rem 1.5rem!important;}
    .btn-close:focus{box-shadow:none!important;}
    .toast{border-radius:var(--radius-md)!important;border:none!important;box-shadow:var(--shadow-md)!important;}
    .alert-danger{background:#fff0f2!important;color:var(--danger)!important;border:none!important;border-left:3px solid var(--danger)!important;border-radius:var(--radius-sm)!important;}
    hr{border-color:var(--border)!important;opacity:1!important;}
    .text-muted{color:var(--text-muted)!important;}
    .text-primary{color:var(--primary)!important;}
    a{color:var(--primary);}  a:hover{color:var(--primary-dark);}
    ::-webkit-scrollbar{width:6px;height:6px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:6px;}
    ::-webkit-scrollbar-thumb:hover{background:var(--text-muted);}
    @media(max-width:768px){#controlPanel .card{position:static!important;max-height:none!important;}#controlPanel .card-body{max-height:none!important;}.navbar{padding:.6rem 1rem!important;}body.bg-light .card .text-center.mb-4{margin:-2rem -1.5rem 1.5rem!important;}body.bg-light .card .card-body{padding:1.5rem!important;}}
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <i class="bi bi-book-half me-2"></i>
        Dyslexia Helper
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto"><li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house me-1"></i>Home</a></li>
          <li class="nav-item">
            <span class="nav-link active" style="cursor:default;opacity:.9;">Reader</span>
          </li>
          <li class="nav-item" id="dashboardLink" style="display: none;">
            <a class="nav-link" href="dashboard.html">My Documents</a>
          </li>
          <li class="nav-item" id="loginLink">
            <a class="nav-link" href="login.html">Login</a>
          </li>
          <li class="nav-item" id="logoutLink" style="display: none;">
            <a class="nav-link" href="#" id="logoutBtn">Logout</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main Container -->
  <div class="container-fluid mt-4" id="mainContainer">
    <div class="row">
      <!-- Control Panel (Left Sidebar) -->
      <div class="col-lg-3 col-md-4 mb-4" id="controlPanel">
        <div class="card shadow-sm">
          <div class="card-header bg-primary text-white">
            <h5 class="mb-0"><i class="bi bi-sliders me-2"></i>Controls</h5>
          </div>
          <div class="card-body">
            
            <!-- Input Methods -->
            <div class="mb-4">
              <h6 class="border-bottom pb-2">Input Text</h6>
              <div class="btn-group-vertical w-100 mb-2">
                <button class="btn btn-outline-primary" id="pasteBtn">
                  <i class="bi bi-clipboard me-2"></i>Paste Text
                </button>
                <label class="btn btn-outline-primary mb-0">
                  <i class="bi bi-file-earmark-text me-2"></i>Upload TXT
                  <input type="file" id="txtUpload" accept=".txt" hidden>
                </label>
                <label class="btn btn-outline-primary mb-0">
                  <i class="bi bi-file-earmark-pdf me-2"></i>Upload PDF
                  <input type="file" id="pdfUpload" accept=".pdf" hidden>
                </label>
              </div>
            </div>

            <!-- Font Selection -->
            <div class="mb-4">
              <label for="fontSelect" class="form-label">Font</label>
              <select class="form-select" id="fontSelect">
                <option value="default">Default</option>
                <option value="opendyslexic">OpenDyslexic</option>
                <option value="lexend">Lexend</option>
              </select>
            </div>

            <!-- Text Size -->
            <div class="mb-4">
              <label for="textSize" class="form-label">
                Text Size: <span id="textSizeValue">16</span>px
              </label>
              <input type="range" class="form-range" id="textSize" min="12" max="32" value="16">
            </div>

            <!-- Letter Spacing -->
            <div class="mb-4">
              <label for="letterSpacing" class="form-label">
                Letter Spacing: <span id="letterSpacingValue">0</span>px
              </label>
              <input type="range" class="form-range" id="letterSpacing" min="0" max="10" value="0">
            </div>

            <!-- Line Height -->
            <div class="mb-4">
              <label for="lineHeight" class="form-label">
                Line Height: <span id="lineHeightValue">1.5</span>
              </label>
              <input type="range" class="form-range" id="lineHeight" min="1.0" max="3.0" step="0.1" value="1.5">
            </div>

            <!-- Word Spacing -->
            <div class="mb-4">
              <label for="wordSpacing" class="form-label">
                Word Spacing: <span id="wordSpacingValue">0</span>px
              </label>
              <input type="range" class="form-range" id="wordSpacing" min="0" max="10" value="0">
            </div>

            <!-- Color Overlay -->
            <div class="mb-4">
              <label for="colorOverlay" class="form-label">Color Overlay</label>
              <select class="form-select" id="colorOverlay">
                <option value="none">None</option>
                <option value="blue">Blue Tint</option>
                <option value="yellow">Yellow Tint</option>
                <option value="green">Green Tint</option>
                <option value="pink">Pink Tint</option>
              </select>
            </div>

            <!-- Overlay Opacity -->
            <div class="mb-4">
              <label for="overlayOpacity" class="form-label">
                Overlay Opacity: <span id="overlayOpacityValue">20</span>%
              </label>
              <input type="range" class="form-range" id="overlayOpacity" min="0" max="100" value="20">
            </div>

            <!-- Features -->
            <div class="mb-4">
              <h6 class="border-bottom pb-2">Features</h6>
              <div class="form-check form-switch mb-2">
                <input class="form-check-input" type="checkbox" id="syllableSplit">
                <label class="form-check-label" for="syllableSplit">
                  Split Syllables
                </label>
              </div>
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="distractionFree">
                <label class="form-check-label" for="distractionFree">
                  Distraction-Free Mode
                </label>
              </div>
            </div>

            <!-- Actions -->
            <div class="d-grid gap-2">
              <button class="btn btn-success" id="savePrefsBtn" disabled>
                <i class="bi bi-save me-2"></i>Save Preferences
              </button>
              <button class="btn btn-secondary" id="downloadBtn" disabled>
                <i class="bi bi-download me-2"></i>Download Text
              </button>
            </div>
          </div>
        </div>

        <!-- TTS Controls Card -->
        <div class="card shadow-sm mt-3">
          <div class="card-header bg-success text-white">
            <h6 class="mb-0"><i class="bi bi-volume-up me-2"></i>Text-to-Speech</h6>
          </div>
          <div class="card-body text-center">
            <div class="btn-group mb-2" role="group">
              <button class="btn btn-outline-success" id="ttsPlay" disabled>
                <i class="bi bi-play-fill"></i>
              </button>
              <button class="btn btn-outline-warning" id="ttsPause" disabled>
                <i class="bi bi-pause-fill"></i>
              </button>
              <button class="btn btn-outline-danger" id="ttsStop" disabled>
                <i class="bi bi-stop-fill"></i>
              </button>
            </div>
            <div class="small text-muted" id="ttsStatus">Ready</div>
          </div>
        </div>
      </div>

      <!-- Reading Area (Right) -->
      <div class="col-lg-9 col-md-8">
        <div class="card shadow-sm reading-area" id="readingAreaCard">
          <div class="card-body" id="readingArea">
            <div class="text-center text-muted py-5" id="emptyState">
              <i class="bi bi-book display-1 mb-3"></i>
              <h3>Welcome to Accessibility Helper</h3>
              <p class="lead">Paste text, upload a document, or load from your saved documents to begin reading.</p>
              <div class="mt-4">
                <button class="btn btn-primary btn-lg" data-bs-toggle="modal" data-bs-target="#pasteModal">
                  <i class="bi bi-clipboard me-2"></i>Paste Text Now
                </button>
              </div>
            </div>
            <div id="textContent" class="text-content" style="display: none;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Paste Text Modal -->
  <div class="modal fade" id="pasteModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Paste Your Text</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="pastedTitle" class="form-label">Title (optional)</label>
            <input type="text" class="form-control" id="pastedTitle" placeholder="My Document">
          </div>
          <div class="mb-3">
            <label for="pastedText" class="form-label">Text Content</label>
            <textarea class="form-control" id="pastedText" rows="10" placeholder="Paste your text here..."></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" id="confirmPaste">Load Text</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="toast" class="toast" role="alert">
      <div class="toast-header">
        <strong class="me-auto" id="toastTitle">Notification</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
      </div>
      <div class="toast-body" id="toastMessage">
        Message here
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  
  <!-- Custom JavaScript Modules -->
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/syllable.js"></script>
  <script src="js/pdfExtractor.js"></script>
  <script src="js/tts.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

<script id="smart-home-link">
(function(){
  var token = localStorage.getItem('dyslexia_token');
  var user  = localStorage.getItem('dyslexia_user');
  // Update every link that points to index.html with class "nav-link" (the Home nav item)
  document.querySelectorAll('a.nav-link[href="index.html"]').forEach(function(a){
    if(token && user) { a.href = 'user-home.html'; }
  });
  // Also update navbar-brand if logged in (brand logo click -> user home)
  var brand = document.querySelector('a.navbar-brand[href="index.html"]');
  if(brand && token && user) { brand.href = 'user-home.html'; }
})();
</script>
</body>
</html>
